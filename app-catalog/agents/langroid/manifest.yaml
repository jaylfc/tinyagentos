id: langroid
name: Langroid
type: agent-framework
verification_status: alpha
version: 0.30.0
description: "Multi-agent message-passing framework with built-in vector store and local LLM support"
homepage: https://github.com/langroid/langroid
license: MIT

requires:
  ram_mb: 384
  python: ">=3.10"

install:
  method: pip
  package: langroid

config_schema:
  - name: model
    type: model-select
    label: LLM Model
    required: true
  - name: vector_store
    type: select
    label: Vector Store
    options: [qdrant, chroma, none]
    default: none

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
