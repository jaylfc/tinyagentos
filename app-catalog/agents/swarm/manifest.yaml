id: swarm
name: Swarm
type: agent-framework
version: 0.1.0
description: "OpenAI's lightweight multi-agent framework — sequential handoffs with shared context"
homepage: https://github.com/openai/swarm
license: MIT

requires:
  ram_mb: 128
  python: ">=3.10"

install:
  method: pip
  package: git+https://github.com/openai/swarm.git

config_schema:
  - name: model
    type: model-select
    label: LLM Model
    required: true

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  x86-vulkan-4gb: full
  cpu-only: full
