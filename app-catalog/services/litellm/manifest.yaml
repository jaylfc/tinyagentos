id: litellm
name: LiteLLM Proxy
type: service
category: llm-runtime
version: 1.55.0
description: "Internal LLM gateway — unified API for all providers, per-agent keys, auto-configured by TinyAgentOS"
homepage: https://github.com/BerriAI/litellm
license: MIT
requires:
  ram_mb: 256
install:
  method: pip
  package: "litellm[proxy]"
hardware_tiers:
  arm-npu-16gb: full
  arm-cpu-8gb: full
  x86-cuda-12gb: full
  cpu-only: full
