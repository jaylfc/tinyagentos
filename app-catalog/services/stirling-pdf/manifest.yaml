id: stirling-pdf
name: Stirling PDF
type: service
category: productivity
version: 0.36.0
description: "Self-hosted PDF toolkit — merge, split, convert, OCR, compress. Agents can process documents."
homepage: https://github.com/Stirling-Tools/Stirling-PDF
license: MIT
requires:
  ram_mb: 512
  disk_mb: 500
  ports: [8080]
install:
  method: docker
  image: frooodle/s-pdf:latest
  volumes: [data:/usr/share/tesseract-ocr]
  ports: [8080]
hardware_tiers:
  arm-npu-16gb: full
  arm-cpu-8gb: full
  x86-cuda-12gb: full
  cpu-only: full
