id: memos
name: Memos
type: service
version: stable
description: "Lightweight note-taking and knowledge base — agents can store and retrieve notes"
homepage: https://usememos.com
license: MIT

requires:
  ram_mb: 128
  disk_mb: 200
  ports: [5230]

install:
  method: docker
  image: neosmemo/memos:stable
  volumes:
    - data:/var/opt/memos
  ports: [5230]

lifecycle:
  health_check: "curl -sf http://localhost:5230"

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
