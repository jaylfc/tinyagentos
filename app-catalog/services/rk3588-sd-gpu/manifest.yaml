id: rk3588-sd-gpu
name: Stable Diffusion (Mali GPU)
type: service
version: 0.1.0
description: "Stable Diffusion on RK3588 Mali-G610 GPU via MLC/TVM — alternative to NPU path"
homepage: https://github.com/happyme531/RK3588-stable-diffusion-GPU
license: MIT

requires:
  ram_mb: 2048
  disk_mb: 4000
  ports: [7865]

install:
  method: script
  script: scripts/install-rk3588-sd-gpu.sh

hardware_tiers:
  arm-npu-16gb: degraded
  arm-npu-32gb: full
  arm-npu-64gb: full
  x86-cuda-12gb: unsupported
  x86-vulkan-8gb: unsupported
  cpu-only: unsupported
