id: rk-llama-cpp
name: rk-llama.cpp
type: service
category: llm-runtime
version: 0.1.0
description: "llama.cpp with Rockchip NPU backend — run GGUF models directly on RK3588 NPU, no model conversion"
homepage: https://github.com/invisiofficial/rk-llama.cpp
license: MIT

requires:
  ram_mb: 512
  disk_mb: 1000
  ports: [8080]

install:
  method: script
  script: scripts/install-rk-llama-cpp.sh

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  arm-npu-64gb: full
  x86-cuda-12gb: unsupported
  cpu-only: unsupported
