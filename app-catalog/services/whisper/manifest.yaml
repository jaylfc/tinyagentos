id: whisper
name: Whisper ASR
type: service
category: voice
version: latest
description: "Speech-to-text via OpenAI Whisper — agents can transcribe audio files and streams"
homepage: https://github.com/openai/whisper
license: MIT

requires:
  ram_mb: 2048
  disk_mb: 5000
  ports: [9000]

install:
  method: docker
  image: onerahmet/openai-whisper-asr-webservice:latest
  volumes:
    - cache:/root/.cache/whisper
  ports: [9000]
  env:
    ASR_MODEL: "base"
    ASR_ENGINE: "openai_whisper"

lifecycle:
  health_check: "curl -sf http://localhost:9000/docs"

hardware_tiers:
  arm-npu-16gb: degraded
  arm-npu-32gb: degraded
  x86-cuda-12gb: full
  x86-vulkan-8gb: degraded
  cpu-only: degraded
