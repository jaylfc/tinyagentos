id: rknn-stable-diffusion
name: RKNN Stable Diffusion
type: service
category: image-gen
version: 0.1.0
description: "Image generation on Rockchip NPU — LCM Dreamshaper V7, 512x512 in seconds on RK3588"
homepage: https://github.com/airockchip/rknn_model_zoo
license: Apache-2.0

requires:
  ram_mb: 1024
  disk_mb: 2000
  ports: [7863]

install:
  method: script
  script: scripts/install-rknn-sd.sh

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  arm-npu-64gb: full
  x86-cuda-12gb: unsupported
  x86-vulkan-8gb: unsupported
  cpu-only: unsupported

lifecycle:
  backend_type: rknn-sd
  default_url: http://localhost:7863
  auto_manage: true
  keep_alive_minutes: 10
  start_cmd: "systemctl start tinyagentos-rknn-sd"
  stop_cmd: "systemctl stop tinyagentos-rknn-sd"
  startup_timeout_seconds: 90
