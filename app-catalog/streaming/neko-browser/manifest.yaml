id: neko-browser
name: Neko Browser
type: streaming-app
version: 2.0.0
description: "Full Firefox or Chrome browser streamed via WebRTC — real browser experience inside TinyAgentOS with multi-user support and <300ms latency"
homepage: https://github.com/m1k1o/neko
license: Apache-2.0

streaming:
  backend: webrtc
  port: 8080
  resolution: 1280x720
  audio: true

mcp:
  server: browser-use-mcp
  install: "pip install browser-use[cli]"
  capabilities:
    - navigate
    - click
    - type
    - scroll
    - extract_text
    - screenshot

agent_bridge:
  port: 9110
  computer_use: optional
  exec_enabled: false
  keyboard_enabled: true

expert_agent:
  name: "Browser Expert"
  system_prompt: "You are a Browser Expert assistant. Help users navigate the web, research topics, fill out forms, and extract information from websites. Use MCP browser tools to click, type, scroll, and capture screenshots. Respect privacy and security — never submit sensitive information without explicit user confirmation."
  model: qwen3-4b
  color: "#FF6B00"

requires:
  ram_mb: 512
  gpu_recommended: false

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
  apple-silicon: full
