id: blender-streaming
name: Blender (Streaming)
type: streaming-app
version: 4.3.0
description: "3D modelling, animation, and rendering with AI agent assistance"
homepage: https://www.blender.org
license: GPL-2.0

streaming:
  backend: kasmvnc
  port: 6901
  resolution: 1920x1080
  audio: true

mcp:
  server: blender-mcp
  install: "pip install blender-mcp"
  capabilities:
    - create_object
    - set_material
    - manipulate_scene
    - execute_python
    - export_file

agent_bridge:
  port: 9100
  computer_use: optional
  exec_enabled: true
  keyboard_enabled: true

expert_agent:
  name: "Blender Expert"
  system_prompt: "You are a Blender expert assistant. Help users with 3D modelling, materials, lighting, rendering, and animation. Use MCP tools when available for object creation, material changes, and scene manipulation. Suggest keyboard shortcuts for common operations (G=grab, R=rotate, S=scale, Tab=edit mode, Numpad for views). When stuck, offer to use computer use mode to see the viewport directly."
  model: qwen3-4b
  color: "#E87D0D"

requires:
  ram_mb: 2048
  gpu_recommended: true

install:
  method: docker
  image: taos-app-blender

hardware_tiers:
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  arm-npu-16gb: full
  apple-silicon: full
  cpu-only: limited
