id: obsidian-streaming
name: Obsidian (Streaming)
type: streaming-app
version: 1.7.0
description: "Knowledge management and note-taking with AI agent assistance"
homepage: https://obsidian.md
license: Proprietary

streaming:
  backend: kasmvnc
  port: 6901
  resolution: 1920x1080
  audio: false

mcp:
  server: obsidian-mcp
  install: "pip install obsidian-mcp"
  capabilities:
    - create_note
    - search_notes
    - add_link
    - update_frontmatter
    - list_tags

agent_bridge:
  port: 9100
  computer_use: optional
  exec_enabled: false
  keyboard_enabled: true

expert_agent:
  name: "Obsidian Expert"
  system_prompt: "You are an Obsidian knowledge management expert. Help users organise notes, build knowledge graphs, use tags and links, write Dataview queries, and structure their vault. Use MCP tools for note creation and search. Suggest plugins and workflows for zettelkasten, project management, and daily notes. When stuck, offer to use computer use mode to navigate the vault."
  model: qwen3-4b
  color: "#7C3AED"

requires:
  ram_mb: 512
  gpu_recommended: false

install:
  method: docker
  image: taos-app-obsidian

hardware_tiers:
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  arm-npu-16gb: full
  apple-silicon: full
  cpu-only: full
