id: google-workspace-mcp
name: Google Workspace MCP
type: plugin
version: 0.1.0
description: "Gmail, Calendar, Docs, Sheets, and Drive integration for agents"
homepage: https://github.com/acheong08/google-workspace-mcp
license: MIT

requires:
  ram_mb: 64

install:
  method: pip
  package: google-workspace-mcp

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
  apple-silicon: full
