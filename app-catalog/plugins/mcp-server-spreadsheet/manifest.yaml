id: mcp-server-spreadsheet
name: MCP Spreadsheets
type: plugin
version: 0.1.0
description: "Read and write spreadsheets (.xlsx, .csv, .ods) with cell-level operations and DuckDB SQL queries"
homepage: https://github.com/marekrost/mcp-server-spreadsheet
license: MIT

requires:
  ram_mb: 64

install:
  method: pip
  package: mcp-server-spreadsheet

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
  apple-silicon: full
