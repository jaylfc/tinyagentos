id: ha-mcp
name: Home Assistant MCP
type: plugin
version: 0.1.0
description: "Home Assistant smart home control via MCP"
homepage: https://github.com/voska/hass-mcp
license: MIT

requires:
  ram_mb: 64

install:
  method: pip
  package: ha-mcp

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
  apple-silicon: full
