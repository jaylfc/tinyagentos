id: git-mcp
name: Git MCP
type: plugin
version: 0.1.0
description: "Remote MCP server for accessing any GitHub project documentation"
homepage: https://github.com/nicepkg/git-mcp
license: Apache-2.0

requires:
  ram_mb: 32

install:
  method: npm
  package: git-mcp

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
  apple-silicon: full
