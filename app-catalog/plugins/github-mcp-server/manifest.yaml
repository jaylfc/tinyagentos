id: github-mcp-server
name: GitHub MCP Server
type: plugin
version: 0.1.0
description: "Official GitHub MCP server — issues, pull requests, repos, code search, and more"
homepage: https://github.com/github/github-mcp-server
license: MIT

requires:
  ram_mb: 64

install:
  method: script
  package: "go install github.com/github/github-mcp-server@latest"

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
  apple-silicon: full
