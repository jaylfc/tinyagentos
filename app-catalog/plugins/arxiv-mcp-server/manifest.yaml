id: arxiv-mcp-server
name: arXiv MCP Server
type: plugin
version: 0.1.0
description: "Search and analyze arXiv research papers"
homepage: https://github.com/blazickjp/arxiv-mcp-server
license: Apache-2.0

requires:
  ram_mb: 64

install:
  method: pip
  package: arxiv-mcp-server

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
  apple-silicon: full
