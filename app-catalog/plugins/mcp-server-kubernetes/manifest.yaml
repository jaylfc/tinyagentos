id: mcp-server-kubernetes
name: MCP Kubernetes
type: plugin
version: 0.1.0
description: "Kubernetes cluster management — pods, deployments, services, and logs"
homepage: https://github.com/Flux159/mcp-server-kubernetes
license: MIT

requires:
  ram_mb: 64

install:
  method: npm
  package: mcp-server-kubernetes

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
  apple-silicon: full
