id: slack-mcp-server
name: Slack MCP Server
type: plugin
version: 0.1.0
description: "Full Slack workspace integration — channels, messages, users, and search"
homepage: https://github.com/modelcontextprotocol/servers
license: MIT

requires:
  ram_mb: 64

install:
  method: script
  package: "go install github.com/modelcontextprotocol/servers/slack-mcp-server@latest"

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
  apple-silicon: full
