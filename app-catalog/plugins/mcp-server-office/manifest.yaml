id: mcp-server-office
name: MCP Office Documents
type: plugin
version: 0.1.0
description: "Read, write, and edit .docx files — agents can create and modify Word documents programmatically"
homepage: https://github.com/famano/mcp-server-office
license: MIT

requires:
  ram_mb: 32

install:
  method: pip
  package: mcp-server-office

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
  apple-silicon: full
