id: mcp-atlassian
name: MCP Atlassian
type: plugin
version: 0.1.0
description: "Jira and Confluence integration for project management and documentation"
homepage: https://github.com/sooperset/mcp-atlassian
license: MIT

requires:
  ram_mb: 64

install:
  method: pip
  package: mcp-atlassian

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
  apple-silicon: full
