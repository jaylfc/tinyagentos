id: mongodb-mcp-server
name: MongoDB MCP Server
type: plugin
version: 0.1.0
description: "Official MongoDB and Atlas MCP server for database operations and queries"
homepage: https://github.com/mongodb-labs/mongodb-mcp-server
license: Apache-2.0

requires:
  ram_mb: 64

install:
  method: npm
  package: mongodb-mcp-server

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
  apple-silicon: full
