id: playwright-mcp
name: Playwright MCP
type: plugin
version: 0.1.0
description: "Official Playwright browser automation MCP server for web interaction and testing"
homepage: https://github.com/microsoft/playwright-mcp
license: Apache-2.0

requires:
  ram_mb: 128

install:
  method: npm
  package: "@anthropic-ai/playwright-mcp"

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
  apple-silicon: full
