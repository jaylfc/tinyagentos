id: youtube-transcript-mcp
name: YouTube Transcript MCP
type: plugin
version: 0.1.0
description: "Download and extract YouTube video transcripts"
homepage: https://github.com/nicholasgriffintn/youtube-transcript-mcp
license: MIT

requires:
  ram_mb: 32

install:
  method: npm
  package: youtube-transcript-mcp

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
  apple-silicon: full
