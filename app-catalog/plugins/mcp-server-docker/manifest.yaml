id: mcp-server-docker
name: MCP Docker
type: plugin
version: 0.1.0
description: "Docker container and image management for agents"
homepage: https://github.com/ckreiling/mcp-server-docker
license: GPL-3.0

requires:
  ram_mb: 64

install:
  method: pip
  package: mcp-server-docker

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
  apple-silicon: full
