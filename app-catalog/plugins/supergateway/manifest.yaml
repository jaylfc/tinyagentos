id: supergateway
name: Supergateway
type: plugin
version: 0.1.0
description: "Run stdio-based MCP servers over SSE transport"
homepage: https://github.com/nicepkg/supergateway
license: MIT

requires:
  ram_mb: 32

install:
  method: npm
  package: supergateway

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
  apple-silicon: full
