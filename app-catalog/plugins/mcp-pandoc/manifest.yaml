id: mcp-pandoc
name: MCP Pandoc
type: plugin
version: 0.1.0
description: "Document format conversion for agents — convert between markdown, docx, odt, pptx, pdf, html, and 30+ formats via pandoc"
homepage: https://github.com/vivekVells/mcp-pandoc
license: MIT

requires:
  ram_mb: 64

install:
  method: pip
  package: mcp-pandoc

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
  apple-silicon: full
