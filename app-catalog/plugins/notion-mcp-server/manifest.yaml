id: notion-mcp-server
name: Notion MCP Server
type: plugin
version: 0.1.0
description: "Official Notion MCP server for pages, databases, and workspace management"
homepage: https://github.com/makenotion/notion-mcp-server
license: MIT

requires:
  ram_mb: 64

install:
  method: npm
  package: "@notionhq/notion-mcp-server"

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
  apple-silicon: full
