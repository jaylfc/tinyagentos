id: chroma-mcp
name: Chroma MCP
type: plugin
version: 0.1.0
description: "ChromaDB vector database MCP server for semantic search and embeddings"
homepage: https://github.com/chroma-core/chroma-mcp
license: Apache-2.0

requires:
  ram_mb: 128

install:
  method: pip
  package: chroma-mcp

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
  apple-silicon: full
