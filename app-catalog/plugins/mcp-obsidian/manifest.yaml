id: mcp-obsidian
name: MCP Obsidian
type: plugin
version: 0.1.0
description: "Obsidian vault interaction — read, search, and manage notes"
homepage: https://github.com/MarkusPfworking/mcp-obsidian
license: MIT

requires:
  ram_mb: 64

install:
  method: npm
  package: mcp-obsidian

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
  apple-silicon: full
