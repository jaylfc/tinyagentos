id: desktop-commander-mcp
name: Desktop Commander MCP
type: plugin
version: 0.1.0
description: "Terminal control, filesystem search, and diff-based file editing for agents"
homepage: https://github.com/wonderwhy-er/DesktopCommanderMCP
license: MIT

requires:
  ram_mb: 64

install:
  method: npm
  package: desktop-commander-mcp

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
  apple-silicon: full
