id: todoist-mcp-server
name: Todoist MCP Server
type: plugin
version: 0.1.0
description: "Todoist task and project management for agents"
homepage: https://github.com/abhiz123/todoist-mcp-server
license: MIT

requires:
  ram_mb: 32

install:
  method: npm
  package: todoist-mcp-server

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
  apple-silicon: full
