id: mcp-sequential-thinking
name: MCP Sequential Thinking
type: plugin
version: 0.1.0
description: "Step-by-step reasoning server for structured agent problem solving"
homepage: https://github.com/modelcontextprotocol/servers
license: MIT

requires:
  ram_mb: 32

install:
  method: npm
  package: "@modelcontextprotocol/server-sequential-thinking"

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
  apple-silicon: full
