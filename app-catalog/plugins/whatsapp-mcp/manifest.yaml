id: whatsapp-mcp
name: WhatsApp MCP
type: plugin
version: 0.1.0
description: "Send and receive WhatsApp messages via MCP"
homepage: https://github.com/lharries/whatsapp-mcp
license: MIT

requires:
  ram_mb: 64

install:
  method: script
  package: "go install github.com/lharries/whatsapp-mcp@latest"

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
  apple-silicon: full
