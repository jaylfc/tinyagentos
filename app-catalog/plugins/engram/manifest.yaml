id: engram
name: Engram
type: plugin
version: 0.1.0
description: "Persistent memory for AI agents using SQLite and FTS5 full-text search"
homepage: https://github.com/nicepkg/engram
license: MIT

requires:
  ram_mb: 64

install:
  method: script
  package: "go install github.com/nicepkg/engram@latest"

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
  apple-silicon: full
