id: firecrawl-mcp
name: Firecrawl MCP
type: plugin
version: 0.1.0
description: "Web scraping and crawling MCP server powered by Firecrawl"
homepage: https://github.com/mendableai/firecrawl-mcp-server
license: MIT

requires:
  ram_mb: 64

install:
  method: npm
  package: firecrawl-mcp

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
  apple-silicon: full
