id: mcp-fetch
name: MCP Fetch
type: plugin
version: 0.1.0
description: "Official MCP HTTP fetch server — retrieve web pages and convert to markdown"
homepage: https://github.com/modelcontextprotocol/servers
license: MIT

requires:
  ram_mb: 32

install:
  method: pip
  package: mcp-server-fetch

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
  apple-silicon: full
