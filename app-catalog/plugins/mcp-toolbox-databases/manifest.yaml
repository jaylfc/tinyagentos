id: mcp-toolbox-databases
name: MCP Toolbox for Databases
type: plugin
version: 0.1.0
description: "Google's universal database MCP server — Postgres, MySQL, SQLite, and more"
homepage: https://github.com/googleapis/genai-toolbox
license: Apache-2.0

requires:
  ram_mb: 128

install:
  method: script
  package: "curl -O https://storage.googleapis.com/genai-toolbox/latest/linux/amd64/toolbox && chmod +x toolbox"

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
  apple-silicon: full
