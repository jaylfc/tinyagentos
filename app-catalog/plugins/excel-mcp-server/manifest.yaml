id: excel-mcp-server
name: Excel MCP Server
type: plugin
version: 0.1.0
description: "Read, write, and manipulate Excel spreadsheet files"
homepage: https://github.com/haris-mcp/excel-mcp-server
license: MIT

requires:
  ram_mb: 64

install:
  method: pip
  package: excel-mcp-server

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
  apple-silicon: full
