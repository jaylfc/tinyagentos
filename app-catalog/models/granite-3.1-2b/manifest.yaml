id: granite-3.1-2b
name: IBM Granite 3.1 2B Instruct
type: model
version: 3.1.0
description: "IBM's 2B enterprise model — 128K context, Apache 2.0, strong at code and structured tasks"
homepage: https://huggingface.co/ibm-granite/granite-3.1-2b-instruct
license: Apache-2.0
capabilities: [chat, tool-calling, code]

variants:
