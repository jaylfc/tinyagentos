id: lcm-dreamshaper-v7
name: LCM Dreamshaper V7
type: model
version: 7.0.0
description: "Fast image generation — 4-step LCM acceleration, 512x512 in seconds on RK3588 NPU"
homepage: https://huggingface.co/happyme531/Stable-Diffusion-1.5-LCM-ONNX-RKNN2
capabilities: [image-generation]

variants:
  - id: rknn
    name: "RKNN (NPU, ~1GB)"
    format: rknn
    size_mb: 1024
    min_ram_mb: 1024
    download_url: https://huggingface.co/happyme531/Stable-Diffusion-1.5-LCM-ONNX-RKNN2/resolve/main/lcm-dreamshaper-v7-rknn.zip
    backend: [rkllama]
    requires_npu: [rk3588, rk3576]

hardware_tiers:
  arm-npu-16gb: {recommended: rknn}
  arm-npu-32gb: {recommended: rknn}
  x86-cuda-12gb: unsupported
  cpu-only: unsupported
