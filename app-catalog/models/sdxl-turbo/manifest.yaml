id: sdxl-turbo
name: SDXL Turbo
type: model
version: 1.0.0
description: "Real-time image generation — single-step SDXL distillation, fast on GPU"
homepage: https://huggingface.co/stabilityai/sdxl-turbo
capabilities: [image-generation]

variants:
  - id: gguf-q4
    name: "GGUF Q4 (3.5GB, GPU)"
    format: gguf
    size_mb: 3500
    min_ram_mb: 6144
    download_url: https://huggingface.co/stabilityai/sdxl-turbo-gguf/resolve/main/sdxl-turbo-Q4_K_M.gguf
    backend: [stable-diffusion-cpp, comfyui]

hardware_tiers:
  arm-npu-16gb: unsupported
  arm-npu-32gb: unsupported
  x86-cuda-8gb: {recommended: gguf-q4}
  x86-cuda-12gb: {recommended: gguf-q4}
  x86-vulkan-8gb: {recommended: gguf-q4}
  cpu-only: unsupported
