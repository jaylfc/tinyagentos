id: controlnet-depth
name: ControlNet Depth (SD 1.5)
type: model
version: 1.0.0
description: "Depth-map based ControlNet — control generation from depth estimation"
homepage: https://huggingface.co/lllyasviel/sd-controlnet-depth
license: "OpenRAIL"
capabilities: [controlnet, image-generation]

variants:
  - id: safetensors
    name: "Safetensors (1.4GB)"
    format: safetensors
    size_mb: 1400
    min_ram_mb: 2048
    download_url: https://huggingface.co/lllyasviel/sd-controlnet-depth/resolve/main/diffusion_pytorch_model.safetensors
    backend: [comfyui, sd-webui, diffusers]

hardware_tiers:
  arm-cpu-16gb: {recommended: safetensors}
  arm-npu-16gb: {recommended: safetensors}
  x86-cuda-8gb: {recommended: safetensors}
  cpu-only: {recommended: safetensors}
