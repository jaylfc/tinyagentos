id: whisper-small
name: Whisper Small (ggml)
type: model
version: 1.0.0
description: "Small Whisper — 244M params, strong multilingual transcription"
homepage: https://huggingface.co/ggerganov/whisper.cpp
license: MIT
capabilities: [speech-to-text, multilingual]

variants:
  - id: ggml
    name: "ggml bin (466MB)"
    format: ggml
    size_mb: 466
    min_ram_mb: 1024
    download_url: https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.bin
    backend: [whisper-cpp]

hardware_tiers:
  arm-cpu-8gb: {recommended: ggml}
  arm-npu-16gb: {recommended: ggml}
  cpu-only: {recommended: ggml}
