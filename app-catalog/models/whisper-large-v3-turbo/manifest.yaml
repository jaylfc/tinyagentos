id: whisper-large-v3-turbo
name: Whisper Large v3 Turbo (ggml)
type: model
version: 3.0.0
description: "Distilled Whisper Large v3 — 8x faster, near-large quality"
homepage: https://huggingface.co/ggerganov/whisper.cpp
license: MIT
capabilities: [speech-to-text, multilingual]

variants:
  - id: ggml
    name: "ggml bin (1.6GB)"
    format: ggml
    size_mb: 1600
    min_ram_mb: 2560
    download_url: https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-large-v3-turbo.bin
    backend: [whisper-cpp]

hardware_tiers:
  arm-cpu-8gb: {recommended: ggml}
  arm-cpu-16gb: {recommended: ggml}
  arm-npu-16gb: {recommended: ggml}
  x86-cuda-8gb: {recommended: ggml}
  cpu-only: {recommended: ggml}
