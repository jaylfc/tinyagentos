{% if backends %}
<table>
    <thead><tr><th>Name</th><th>Type</th><th>Priority</th><th>Status</th><th>Response</th></tr></thead>
    <tbody>
    {% for b in backends %}
    <tr>
        <td>{{ b.name }}</td>
        <td>{{ b.type }}</td>
        <td>{{ b.priority }}</td>
        <td><span class="status-dot {{ b.status }}"></span>{{ b.status }}</td>
        <td>{% if b.response_ms %}{{ b.response_ms }}ms{% else %}—{% endif %}</td>
    </tr>
    {% endfor %}
    </tbody>
</table>
{% else %}
<p>No backends configured.</p>
{% endif %}
