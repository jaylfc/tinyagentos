<div class="kpi-grid">
    <article class="kpi-card">
        <div class="value" style="color: {{ 'green' if agents_online == agents_total else 'orange' }}">
            {{ agents_online }}/{{ agents_total }}
        </div>
        <div class="label">Agents Online</div>
    </article>
    <article class="kpi-card">
        <div class="value" style="color: #7ecfff">{{ total_vectors }}</div>
        <div class="label">Total Vectors</div>
    </article>
    <article class="kpi-card">
        <div class="value" style="color: {{ '#98fb98' if avg_response_ms else '#ff6b6b' }}">
            {% if avg_response_ms %}{{ avg_response_ms }}ms{% else %}N/A{% endif %}
        </div>
        <div class="label">Avg Backend Response</div>
    </article>
    <article class="kpi-card">
        <div class="value" style="color: #ffd700">
            {% if qmd_latency_ms %}{{ qmd_latency_ms }}ms{% else %}N/A{% endif %}
        </div>
        <div class="label">QMD Latency</div>
    </article>
</div>
<div class="kpi-grid" style="margin-top: 1rem;">
    <article class="kpi-card">
        <canvas id="cpu-spark" height="60" role="img" aria-label="CPU usage over time"></canvas>
        <div class="label">CPU Usage</div>
    </article>
    <article class="kpi-card">
        <canvas id="ram-spark" height="60" role="img" aria-label="RAM usage over time"></canvas>
        <div class="label">RAM Usage</div>
    </article>
</div>
