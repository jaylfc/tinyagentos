{% if events %}
<table role="grid">
  <thead>
    <tr>
      <th scope="col">Time</th>
      <th scope="col">Event</th>
      <th scope="col">Details</th>
    </tr>
  </thead>
  <tbody>
    {% for e in events %}
    <tr>
      <td style="white-space:nowrap; font-size:0.8rem; color:var(--pico-muted-color);">
        <time>{{ e.timestamp }}</time>
      </td>
      <td>
        <span class="badge {% if e.level == 'warning' %}badge-warning{% elif e.level == 'error' %}badge-error{% else %}badge-info{% endif %}" style="display:inline-block; padding:0.15rem 0.5rem; border-radius:4px; font-size:0.75rem; {% if e.level == 'warning' %}background:#f0ad4e;color:#000{% elif e.level == 'error' %}background:#d9534f;color:#fff{% else %}background:#5bc0de;color:#000{% endif %}">{{ e.source or 'system' }}</span>
        {{ e.title }}
      </td>
      <td style="font-size:0.85rem; color:var(--pico-muted-color);">{{ e.message[:100] }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<p style="color:var(--pico-muted-color);">No recent activity</p>
{% endif %}
