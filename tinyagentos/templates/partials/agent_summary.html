{% if agents %}
<table aria-label="Agent summary">
    <thead><tr><th>Agent</th><th>Status</th><th>Vectors</th><th>Last Embed</th></tr></thead>
    <tbody>
    {% for a in agents %}
    <tr>
        <td><span class="agent-color" style="background: {{ a.color }}"></span>{{ a.name }}</td>
        <td><span class="status-dot {{ a.status }}"></span>{{ a.status }}</td>
        <td>{{ a.vectors }}</td>
        <td>{{ a.last_embedded or '—' }}</td>
    </tr>
    {% endfor %}
    </tbody>
</table>
{% else %}
<p>No agents configured.</p>
{% endif %}
