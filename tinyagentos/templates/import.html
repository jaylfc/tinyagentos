{% extends "base.html" %}
{% block title %}Import Data — TinyAgentOS{% endblock %}
{% block content %}
<h2>Import Data</h2>
<p>Upload documents to embed into an agent's memory.</p>

<label for="import-agent">Agent</label>
<select id="import-agent" aria-label="Select agent for import">
    <option value="">Select agent...</option>
    {% for agent in agents %}
    <option value="{{ agent }}">{{ agent }}</option>
    {% endfor %}
</select>

<div id="drop-zone" aria-label="Drop files here to import"
     style="border: 2px dashed var(--pico-muted-border-color); border-radius: 8px; padding: 3rem; text-align: center;"
     ondragover="event.preventDefault(); this.style.borderColor='var(--pico-primary)'"
     ondragleave="this.style.borderColor='var(--pico-muted-border-color)'"
     ondrop="handleDrop(event)">
    <p>Drag & drop files here</p>
    <p style="color: var(--pico-muted-color);">or</p>
    <input type="file" multiple accept=".txt,.md,.pdf,.html,.json,.csv" aria-label="Select files" onchange="handleFiles(this.files)">
</div>

<p style="color: var(--pico-muted-color); font-size: 0.85rem; margin-top: 0.5rem;">
    Supported formats: .txt, .md, .pdf, .html, .json, .csv
</p>

<div id="file-list" style="margin-top: 1rem;"></div>

<div id="upload-progress" style="display: none; margin-top: 1rem;">
    <progress id="progress-bar" value="0" max="100" aria-label="Upload progress"></progress>
    <span id="progress-text"></span>
</div>

<button id="embed-btn" style="margin-top: 1rem; display: none;" aria-label="Embed uploaded files into agent memory" onclick="embedFiles()">
    Embed into Memory
</button>

<div id="status-feedback" role="status" aria-live="polite" style="margin-top: 1rem;"></div>

<script>
let uploadedFiles = [];

function handleDrop(e) {
    e.preventDefault();
    e.currentTarget.style.borderColor = 'var(--pico-muted-border-color)';
    handleFiles(e.dataTransfer.files);
}

async function handleFiles(files) {
    const progressDiv = document.getElementById('upload-progress');
    const progressBar = document.getElementById('progress-bar');
    const progressText = document.getElementById('progress-text');
    progressDiv.style.display = 'block';

    const total = files.length;
    let done = 0;

    for (const file of files) {
        progressText.textContent = `Uploading ${file.name}...`;
        const formData = new FormData();
        formData.append('file', file);
        try {
            const resp = await fetch('/api/import/upload', {method: 'POST', body: formData});
            const data = await resp.json();
            if (resp.ok) {
                uploadedFiles.push(data);
            } else {
                showToast(data.error || `Failed to upload ${file.name}`, 'error');
            }
        } catch (err) {
            showToast(`Error uploading ${file.name}`, 'error');
        }
        done++;
        progressBar.value = Math.round((done / total) * 100);
    }

    progressText.textContent = `${done} file(s) uploaded`;
    renderFileList();
}

function renderFileList() {
    const container = document.getElementById('file-list');
    if (uploadedFiles.length === 0) {
        container.innerHTML = '';
        document.getElementById('embed-btn').style.display = 'none';
        return;
    }
    document.getElementById('embed-btn').style.display = 'inline-block';
    container.innerHTML = '<h4>Uploaded Files</h4><ul>' +
        uploadedFiles.map((f, i) =>
            `<li>${f.filename} (${(f.size / 1024).toFixed(1)} KB) <a href="#" onclick="removeFile(${i}); return false;" aria-label="Remove ${f.filename}">Remove</a></li>`
        ).join('') + '</ul>';
}

function removeFile(index) {
    uploadedFiles.splice(index, 1);
    renderFileList();
}

async function embedFiles() {
    const agent = document.getElementById('import-agent').value;
    if (!agent) { showToast('Select an agent first', 'error'); return; }
    if (uploadedFiles.length === 0) { showToast('No files uploaded', 'error'); return; }

    const statusDiv = document.getElementById('status-feedback');
    statusDiv.innerHTML = '<p aria-busy="true">Embedding files...</p>';

    const resp = await fetch('/api/import/embed', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({agent_name: agent, files: uploadedFiles.map(f => f.filename)}),
    });
    const data = await resp.json();
    if (resp.ok) {
        statusDiv.innerHTML = `<p style="color: var(--pico-ins-color);">Successfully embedded ${data.count} file(s) into ${data.agent_name}'s memory.</p>`;
        uploadedFiles = [];
        renderFileList();
        document.getElementById('upload-progress').style.display = 'none';
        showToast(`Embedded ${data.count} files`);
    } else {
        statusDiv.innerHTML = `<p style="color: var(--pico-del-color);">${data.error}</p>`;
        showToast(data.error || 'Embedding failed', 'error');
    }
}
</script>
{% endblock %}
