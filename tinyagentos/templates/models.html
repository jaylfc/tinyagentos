{% extends "base.html" %}
{% block title %}Models — TinyAgentOS{% endblock %}
{% block content %}
<h2>Model Manager</h2>

<section aria-label="Search Models">
    <h3>Browse Models</h3>
    <div class="grid">
        <input type="search" id="model-search" placeholder="Search models (e.g. qwen3, llama, mistral)..."
               aria-label="Search models"
               hx-get="/api/models/search" hx-trigger="keyup changed delay:500ms"
               hx-target="#search-results" hx-include="[name='source']"
               name="q">
        <select name="source" aria-label="Model source">
            <option value="all">All Sources</option>
            <option value="huggingface">HuggingFace (GGUF)</option>
            <option value="ollama">Ollama Library</option>
            <option value="catalog">Local Catalog</option>
        </select>
    </div>
    <div id="search-results"></div>
</section>

<section id="downloaded-section">
    <h3>Downloaded Models</h3>
    <div id="downloaded-models" hx-get="/api/models" hx-trigger="load" hx-target="#models-content" hx-swap="innerHTML">
        <article aria-busy="true">Loading...</article>
    </div>
</section>

<div id="models-content">
    <article aria-busy="true">Loading model catalog...</article>
</div>

<template id="models-template">
    <!-- Populated by JS from /api/models response -->
</template>

<script>
document.addEventListener('htmx:afterRequest', function(evt) {
    if (evt.detail.pathInfo.requestPath !== '/api/models') return;

    const data = JSON.parse(evt.detail.xhr.responseText);
    const container = document.getElementById('models-content');

    // Downloaded section
    let downloadedHtml = '';
    const downloadedFiles = data.downloaded_files || [];
    if (downloadedFiles.length === 0) {
        downloadedHtml = '<p style="color: var(--pico-muted-color);">No models downloaded yet. Browse the catalog to get started.</p>';
    } else {
        downloadedHtml = '<div class="kpi-grid">';
        downloadedFiles.forEach(f => {
            downloadedHtml += `
                <article class="kpi-card" style="text-align: left; padding: 1rem;">
                    <strong>${f.filename}</strong>
                    <br><small>${f.size_mb} MB &middot; ${f.format.toUpperCase()}</small>
                </article>`;
        });
        downloadedHtml += '</div>';
    }

    // Available models
    let availableHtml = '<h3>Available Models</h3>';
    const models = data.models || [];
    if (models.length === 0) {
        availableHtml += '<p style="color: var(--pico-muted-color);">No models in catalog.</p>';
    } else {
        availableHtml += '<div class="kpi-grid">';
        models.forEach(m => {
            const compatColor = m.compatibility === 'green' ? '#4caf50' :
                                m.compatibility === 'yellow' ? '#ff9800' : '#f44336';
            const capBadges = (m.capabilities || []).map(c =>
                `<kbd style="font-size: 0.75rem;">${c}</kbd>`).join(' ');

            let variantsHtml = '<ul style="padding-left: 1rem; margin: 0.5rem 0;">';
            (m.variants || []).forEach(v => {
                const vColor = v.compatibility === 'green' ? '#4caf50' :
                               v.compatibility === 'yellow' ? '#ff9800' : '#f44336';
                const backends = (v.backend || []).join(', ');
                const ramReq = v.min_ram_mb ? v.min_ram_mb + ' MB RAM' : 'No RAM requirement';
                const dlId = `${m.id}-${v.id}`;
                const dlLabel = v.downloaded
                    ? '<mark>Downloaded</mark>'
                    : `<button class="outline" style="padding: 0.25rem 0.75rem; font-size: 0.8rem;"
                         onclick="startDownload('${m.id}', '${v.id}', this)"
                         >Download</button>
                       <div id="progress-${dlId}" style="display:none; margin-top:0.25rem;">
                           <progress id="bar-${dlId}" value="0" max="100" style="width:100%;"></progress>
                           <small id="label-${dlId}">Starting...</small>
                       </div>`;
                variantsHtml += `<li style="margin-bottom: 0.5rem;">
                    <span style="color: ${vColor};">&#9679;</span>
                    <strong>${v.name}</strong> &mdash; ${v.size_mb} MB, ${(v.format || '').toUpperCase()}
                    <br><small>Backends: ${backends} &middot; ${ramReq}</small>
                    <br>${dlLabel}
                </li>`;
            });
            variantsHtml += '</ul>';

            availableHtml += `
                <article class="kpi-card" style="text-align: left; padding: 1.25rem;">
                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                        <span style="color: ${compatColor}; font-size: 1.2rem;">&#9679;</span>
                        <h4 style="margin: 0;">${m.name}</h4>
                    </div>
                    <small style="color: var(--pico-muted-color);">v${m.version}</small>
                    <p style="font-size: 0.9rem; margin: 0.5rem 0;">${m.description}</p>
                    <div style="margin-bottom: 0.5rem;">${capBadges}</div>
                    ${variantsHtml}
                    ${m.has_downloaded_variant ? '' :
                        `<button class="outline contrast" style="font-size: 0.8rem;"
                             hx-delete="/api/models/${m.id}"
                             hx-confirm="Delete all files for ${m.name}?"
                             style="display:none;">Delete</button>`}
                    ${m.has_downloaded_variant ?
                        `<button class="outline contrast" style="font-size: 0.8rem;"
                             hx-delete="/api/models/${m.id}"
                             hx-confirm="Delete all downloaded files for ${m.name}?">Delete All</button>` : ''}
                </article>`;
        });
        availableHtml += '</div>';
    }

    // Replace downloaded section
    document.getElementById('downloaded-models').innerHTML = downloadedHtml;
    container.innerHTML = availableHtml;

    // Re-process htmx for new dynamic content
    htmx.process(container);
    htmx.process(document.getElementById('downloaded-models'));
});

async function startDownload(appId, variantId, btn) {
    btn.disabled = true;
    btn.textContent = 'Starting...';
    const dlId = appId + '-' + variantId;
    try {
        const resp = await fetch('/api/models/download', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({app_id: appId, variant_id: variantId}),
        });
        const data = await resp.json();
        if (!resp.ok) {
            btn.disabled = false;
            btn.textContent = 'Download';
            alert(data.error || 'Download failed');
            return;
        }
        const progressDiv = document.getElementById('progress-' + dlId);
        if (progressDiv) progressDiv.style.display = 'block';
        btn.style.display = 'none';
        pollProgress(data.download_id);
    } catch (e) {
        btn.disabled = false;
        btn.textContent = 'Download';
    }
}

function pollProgress(downloadId) {
    const bar = document.getElementById('bar-' + downloadId);
    const label = document.getElementById('label-' + downloadId);
    if (!bar || !label) return;

    const interval = setInterval(async () => {
        try {
            const resp = await fetch('/api/models/downloads/' + downloadId);
            const data = await resp.json();
            bar.value = data.percent || 0;
            if (data.status === 'downloading') {
                const mb = (data.downloaded_bytes / 1048576).toFixed(1);
                const totalMb = data.total_bytes ? (data.total_bytes / 1048576).toFixed(1) : '?';
                label.textContent = mb + ' / ' + totalMb + ' MB (' + data.percent + '%)';
            } else if (data.status === 'complete') {
                clearInterval(interval);
                bar.value = 100;
                label.textContent = 'Complete';
                // Refresh model list
                htmx.trigger('#downloaded-models', 'load');
            } else if (data.status === 'error') {
                clearInterval(interval);
                label.textContent = 'Error: ' + (data.error || 'unknown');
                label.style.color = '#ff6b6b';
            }
        } catch (e) {
            clearInterval(interval);
            label.textContent = 'Connection error';
        }
    }, 2000);
}
</script>
{% endblock %}
