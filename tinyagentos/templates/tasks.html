{% extends "base.html" %}
{% block title %}Scheduled Tasks — TinyAgentOS{% endblock %}
{% block content %}
<h2>Scheduled Tasks</h2>

<div style="display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem;">
    <label for="filter-agent" style="margin:0;">Filter by Agent:</label>
    <select id="filter-agent" aria-label="Filter tasks by agent" onchange="loadTasks()" style="width: auto;">
        <option value="">All Agents</option>
        {% for agent in agents %}
        <option value="{{ agent }}">{{ agent }}</option>
        {% endfor %}
    </select>
    <button class="outline" onclick="document.getElementById('add-task-dialog').showModal()" aria-label="Add new task">Add Task</button>
</div>

<table aria-label="Scheduled tasks list">
    <thead>
        <tr>
            <th>Name</th>
            <th>Agent</th>
            <th>Schedule</th>
            <th>Command</th>
            <th>Status</th>
            <th>Last Run</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody id="tasks-body">
        <tr><td colspan="7">Loading...</td></tr>
    </tbody>
</table>

<dialog id="add-task-dialog" aria-label="Add scheduled task">
    <article style="min-width: 400px;">
        <header>
            <button aria-label="Close" rel="prev" onclick="this.closest('dialog').close()"></button>
            <h3>Add Scheduled Task</h3>
        </header>
        <form id="add-task-form" onsubmit="addTask(event)">
            <label for="task-name">Name</label>
            <input type="text" id="task-name" required aria-label="Task name" placeholder="e.g. Daily Embed">
            <label for="task-agent">Agent</label>
            <select id="task-agent" aria-label="Assign to agent">
                <option value="">None (global)</option>
                {% for agent in agents %}
                <option value="{{ agent }}">{{ agent }}</option>
                {% endfor %}
            </select>
            <label for="task-schedule">Schedule (cron)</label>
            <input type="text" id="task-schedule" required aria-label="Cron schedule" placeholder="0 2 * * *">
            <label for="task-command">Command</label>
            <input type="text" id="task-command" required aria-label="Command to run" placeholder="qmd embed">
            <label for="task-description">Description</label>
            <input type="text" id="task-description" aria-label="Task description" placeholder="Optional description">
            <button type="submit">Create Task</button>
        </form>
    </article>
</dialog>

<dialog id="edit-task-dialog" aria-label="Edit scheduled task">
    <article style="min-width: 400px;">
        <header>
            <button aria-label="Close" rel="prev" onclick="this.closest('dialog').close()"></button>
            <h3>Edit Task</h3>
        </header>
        <form id="edit-task-form" onsubmit="saveTask(event)">
            <input type="hidden" id="edit-task-id">
            <label for="edit-task-name">Name</label>
            <input type="text" id="edit-task-name" required aria-label="Task name">
            <label for="edit-task-schedule">Schedule (cron)</label>
            <input type="text" id="edit-task-schedule" required aria-label="Cron schedule">
            <label for="edit-task-command">Command</label>
            <input type="text" id="edit-task-command" required aria-label="Command to run">
            <label for="edit-task-description">Description</label>
            <input type="text" id="edit-task-description" aria-label="Task description">
            <button type="submit">Save Changes</button>
        </form>
    </article>
</dialog>

<h3 style="margin-top: 2rem;">Task Presets</h3>
<div id="presets-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem;">
    <p>Loading presets...</p>
</div>

<script>
async function loadTasks() {
    const agent = document.getElementById('filter-agent').value;
    const url = agent ? `/api/tasks?agent=${encodeURIComponent(agent)}` : '/api/tasks';
    const resp = await fetch(url);
    const tasks = await resp.json();
    const tbody = document.getElementById('tasks-body');
    if (tasks.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7">No scheduled tasks</td></tr>';
        return;
    }
    tbody.innerHTML = tasks.map(t => `
        <tr>
            <td>${t.name}</td>
            <td>${t.agent_name || '—'}</td>
            <td><code>${t.schedule}</code></td>
            <td><code>${t.command}</code></td>
            <td><span style="color: ${t.enabled ? 'var(--pico-ins-color)' : 'var(--pico-del-color)'};">${t.enabled ? 'Enabled' : 'Disabled'}</span></td>
            <td>${t.last_run ? new Date(t.last_run * 1000).toLocaleString() : 'Never'}</td>
            <td>
                <button class="outline secondary" style="padding: 0.2rem 0.5rem; font-size: 0.8rem;" aria-label="Toggle task ${t.name}" onclick="toggleTask(${t.id})">${t.enabled ? 'Disable' : 'Enable'}</button>
                <button class="outline secondary" style="padding: 0.2rem 0.5rem; font-size: 0.8rem;" aria-label="Edit task ${t.name}" onclick="editTask(${t.id}, '${t.name}', '${t.schedule}', '${t.command}', '${t.description || ''}')">Edit</button>
                <button class="outline secondary" style="padding: 0.2rem 0.5rem; font-size: 0.8rem;" aria-label="Delete task ${t.name}" onclick="deleteTask(${t.id}, '${t.name}')">Delete</button>
            </td>
        </tr>
    `).join('');
}

async function addTask(e) {
    e.preventDefault();
    const body = {
        name: document.getElementById('task-name').value,
        agent_name: document.getElementById('task-agent').value || null,
        schedule: document.getElementById('task-schedule').value,
        command: document.getElementById('task-command').value,
        description: document.getElementById('task-description').value,
    };
    const resp = await fetch('/api/tasks', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)});
    if (resp.ok) {
        showToast('Task created');
        document.getElementById('add-task-dialog').close();
        document.getElementById('add-task-form').reset();
        loadTasks();
    } else {
        const err = await resp.json();
        showToast(err.error || 'Failed to create task', 'error');
    }
}

async function toggleTask(id) {
    const resp = await fetch(`/api/tasks/${id}/toggle`, {method: 'POST'});
    if (resp.ok) { loadTasks(); }
}

function editTask(id, name, schedule, command, description) {
    document.getElementById('edit-task-id').value = id;
    document.getElementById('edit-task-name').value = name;
    document.getElementById('edit-task-schedule').value = schedule;
    document.getElementById('edit-task-command').value = command;
    document.getElementById('edit-task-description').value = description;
    document.getElementById('edit-task-dialog').showModal();
}

async function saveTask(e) {
    e.preventDefault();
    const id = document.getElementById('edit-task-id').value;
    const body = {
        name: document.getElementById('edit-task-name').value,
        schedule: document.getElementById('edit-task-schedule').value,
        command: document.getElementById('edit-task-command').value,
        description: document.getElementById('edit-task-description').value,
    };
    const resp = await fetch(`/api/tasks/${id}`, {method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)});
    if (resp.ok) {
        showToast('Task updated');
        document.getElementById('edit-task-dialog').close();
        loadTasks();
    } else {
        const err = await resp.json();
        showToast(err.error || 'Failed to update task', 'error');
    }
}

async function deleteTask(id, name) {
    if (!confirm(`Delete task "${name}"?`)) return;
    const resp = await fetch(`/api/tasks/${id}`, {method: 'DELETE'});
    if (resp.ok) { showToast('Task deleted'); loadTasks(); }
}

async function loadPresets() {
    const resp = await fetch('/api/tasks/presets');
    const presets = await resp.json();
    const container = document.getElementById('presets-container');
    if (presets.length === 0) {
        container.innerHTML = '<p>No presets available</p>';
        return;
    }
    const agents = {{ agents | tojson }};
    container.innerHTML = presets.map(p => `
        <article>
            <header><strong>${p.name}</strong></header>
            <p>${p.description}</p>
            <ul>${p.tasks.map(t => `<li><code>${t.schedule}</code> — ${t.name}</li>`).join('')}</ul>
            <footer>
                <select aria-label="Select agent for preset ${p.name}" class="preset-agent" data-preset-id="${p.id}" style="margin-bottom: 0.5rem;">
                    <option value="">Select agent...</option>
                    ${agents.map(a => `<option value="${a}">${a}</option>`).join('')}
                </select>
                <button class="outline" aria-label="Apply preset ${p.name}" onclick="applyPreset(${p.id}, this)">Apply to Agent</button>
            </footer>
        </article>
    `).join('');
}

async function applyPreset(presetId, btn) {
    const select = btn.parentElement.querySelector('.preset-agent');
    const agent = select.value;
    if (!agent) { showToast('Select an agent first', 'error'); return; }
    const resp = await fetch(`/api/tasks/presets/${presetId}/apply`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({agent_name: agent}),
    });
    if (resp.ok) {
        const data = await resp.json();
        showToast(`Applied ${data.tasks_created} tasks to ${agent}`);
        loadTasks();
    }
}

// Initial load
loadTasks();
loadPresets();
</script>
{% endblock %}
