{% extends "base.html" %}
{% block title %}Secrets — TinyAgentOS{% endblock %}
{% block content %}
<hgroup>
    <h2>Secrets</h2>
    <p>Manage API keys, tokens, and credentials. Control which agents can access each secret.</p>
</hgroup>

<div style="display:flex; gap:1rem; margin-bottom:1rem; flex-wrap:wrap; align-items:center;">
    <label for="filter-category" style="margin:0;">Filter by category:</label>
    <select id="filter-category" aria-label="Filter secrets by category" style="width:auto; margin:0;"
            onchange="loadSecrets()">
        <option value="">All categories</option>
    </select>
    <button onclick="document.getElementById('add-dialog').showModal()" aria-label="Add new secret">Add Secret</button>
</div>

<dialog id="add-dialog" aria-labelledby="add-dialog-title">
    <article style="min-width:400px;">
        <header>
            <button aria-label="Close" rel="prev" onclick="document.getElementById('add-dialog').close()"></button>
            <h3 id="add-dialog-title">Add Secret</h3>
        </header>
        <form id="add-form" onsubmit="addSecret(event)">
            <label for="secret-name">Name</label>
            <input type="text" id="secret-name" name="name" required placeholder="e.g. OPENAI_API_KEY" aria-label="Secret name">

            <label for="secret-value">Value</label>
            <input type="password" id="secret-value" name="value" required placeholder="Enter secret value" aria-label="Secret value">

            <label for="secret-category">Category</label>
            <select id="secret-category" name="category" aria-label="Secret category">
                <option value="general">general</option>
            </select>

            <label for="secret-description">Description</label>
            <input type="text" id="secret-description" name="description" placeholder="Optional description" aria-label="Secret description">

            <label for="secret-agents">Agent Access</label>
            <input type="text" id="secret-agents" name="agents" placeholder="agent1, agent2 (comma-separated)" aria-label="Agents with access">

            <footer style="display:flex; gap:0.5rem; justify-content:flex-end;">
                <button type="button" class="outline" onclick="document.getElementById('add-dialog').close()">Cancel</button>
                <button type="submit">Save</button>
            </footer>
        </form>
    </article>
</dialog>

<dialog id="edit-dialog" aria-labelledby="edit-dialog-title">
    <article style="min-width:400px;">
        <header>
            <button aria-label="Close" rel="prev" onclick="document.getElementById('edit-dialog').close()"></button>
            <h3 id="edit-dialog-title">Edit Secret</h3>
        </header>
        <form id="edit-form" onsubmit="updateSecret(event)">
            <input type="hidden" id="edit-name">

            <label for="edit-value">Value</label>
            <input type="password" id="edit-value" name="value" placeholder="Leave blank to keep current" aria-label="New secret value">

            <label for="edit-category">Category</label>
            <select id="edit-category" name="category" aria-label="Secret category">
                <option value="general">general</option>
            </select>

            <label for="edit-description">Description</label>
            <input type="text" id="edit-description" name="description" aria-label="Secret description">

            <label for="edit-agents">Agent Access</label>
            <input type="text" id="edit-agents" name="agents" placeholder="agent1, agent2 (comma-separated)" aria-label="Agents with access">

            <footer style="display:flex; gap:0.5rem; justify-content:flex-end;">
                <button type="button" class="outline" onclick="document.getElementById('edit-dialog').close()">Cancel</button>
                <button type="submit">Update</button>
            </footer>
        </form>
    </article>
</dialog>

<table role="grid" aria-label="Secrets table">
    <thead>
        <tr>
            <th scope="col">Name</th>
            <th scope="col">Category</th>
            <th scope="col">Value</th>
            <th scope="col">Description</th>
            <th scope="col">Agent Access</th>
            <th scope="col">Actions</th>
        </tr>
    </thead>
    <tbody id="secrets-body">
        <tr><td colspan="6">Loading...</td></tr>
    </tbody>
</table>

<script>
let allSecrets = [];

async function loadCategories() {
    const resp = await fetch('/api/secrets/categories');
    const cats = await resp.json();
    const selects = [
        document.getElementById('filter-category'),
        document.getElementById('secret-category'),
        document.getElementById('edit-category'),
    ];
    cats.forEach(c => {
        selects.forEach((sel, idx) => {
            if (idx === 0) {
                // filter already has "All" option
                const opt = document.createElement('option');
                opt.value = c.name;
                opt.textContent = c.name;
                sel.appendChild(opt);
            } else {
                const opt = document.createElement('option');
                opt.value = c.name;
                opt.textContent = c.name;
                sel.appendChild(opt);
            }
        });
    });
}

async function loadSecrets() {
    const cat = document.getElementById('filter-category').value;
    const url = cat ? `/api/secrets?category=${encodeURIComponent(cat)}` : '/api/secrets';
    const resp = await fetch(url);
    allSecrets = await resp.json();
    renderSecrets();
}

function renderSecrets() {
    const body = document.getElementById('secrets-body');
    if (allSecrets.length === 0) {
        body.innerHTML = '<tr><td colspan="6">No secrets stored yet. Click "Add Secret" to create one.</td></tr>';
        return;
    }
    body.innerHTML = allSecrets.map(s => `
        <tr>
            <td><strong>${esc(s.name)}</strong></td>
            <td><span class="badge">${esc(s.category)}</span></td>
            <td>
                <code id="val-${esc(s.name)}" aria-label="Secret value (hidden)">&bull;&bull;&bull;&bull;&bull;</code>
                <button class="outline" style="padding:0.2rem 0.5rem; font-size:0.75rem; margin-left:0.5rem;"
                        onclick="revealSecret('${esc(s.name)}')" aria-label="Reveal secret value">Reveal</button>
            </td>
            <td>${esc(s.description || '')}</td>
            <td>${(s.agents || []).map(a => '<span class="badge" style="background:var(--pico-primary);color:#fff;padding:0.1rem 0.4rem;border-radius:4px;margin:0.1rem;">' + esc(a) + '</span>').join(' ') || '<em>none</em>'}</td>
            <td>
                <button class="outline" style="padding:0.2rem 0.5rem; font-size:0.75rem;" onclick="editSecret('${esc(s.name)}')" aria-label="Edit secret ${esc(s.name)}">Edit</button>
                <button class="outline" style="padding:0.2rem 0.5rem; font-size:0.75rem; color:var(--pico-del-color);" onclick="deleteSecret('${esc(s.name)}')" aria-label="Delete secret ${esc(s.name)}">Delete</button>
            </td>
        </tr>
    `).join('');
}

async function revealSecret(name) {
    const el = document.getElementById('val-' + name);
    if (el.dataset.revealed === 'true') {
        el.textContent = '\u2022\u2022\u2022\u2022\u2022';
        el.dataset.revealed = 'false';
        return;
    }
    const resp = await fetch(`/api/secrets/${encodeURIComponent(name)}`);
    if (resp.ok) {
        const data = await resp.json();
        el.textContent = data.value;
        el.dataset.revealed = 'true';
    }
}

async function addSecret(e) {
    e.preventDefault();
    const agentsStr = document.getElementById('secret-agents').value.trim();
    const agents = agentsStr ? agentsStr.split(',').map(a => a.trim()).filter(Boolean) : [];
    const resp = await fetch('/api/secrets', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            name: document.getElementById('secret-name').value,
            value: document.getElementById('secret-value').value,
            category: document.getElementById('secret-category').value,
            description: document.getElementById('secret-description').value,
            agents: agents,
        }),
    });
    if (resp.ok) {
        document.getElementById('add-dialog').close();
        document.getElementById('add-form').reset();
        showToast('Secret added');
        loadSecrets();
    } else {
        const err = await resp.json();
        showToast(err.error || 'Failed to add secret', 'error');
    }
}

async function editSecret(name) {
    const resp = await fetch(`/api/secrets/${encodeURIComponent(name)}`);
    if (!resp.ok) return;
    const data = await resp.json();
    document.getElementById('edit-name').value = data.name;
    document.getElementById('edit-value').value = '';
    document.getElementById('edit-category').value = data.category;
    document.getElementById('edit-description').value = data.description || '';
    document.getElementById('edit-agents').value = (data.agents || []).join(', ');
    document.getElementById('edit-dialog').showModal();
}

async function updateSecret(e) {
    e.preventDefault();
    const name = document.getElementById('edit-name').value;
    const val = document.getElementById('edit-value').value;
    const agentsStr = document.getElementById('edit-agents').value.trim();
    const agents = agentsStr ? agentsStr.split(',').map(a => a.trim()).filter(Boolean) : [];
    const body = {
        category: document.getElementById('edit-category').value,
        description: document.getElementById('edit-description').value,
        agents: agents,
    };
    if (val) body.value = val;
    const resp = await fetch(`/api/secrets/${encodeURIComponent(name)}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body),
    });
    if (resp.ok) {
        document.getElementById('edit-dialog').close();
        showToast('Secret updated');
        loadSecrets();
    } else {
        const err = await resp.json();
        showToast(err.error || 'Failed to update secret', 'error');
    }
}

async function deleteSecret(name) {
    if (!confirm(`Delete secret "${name}"?`)) return;
    const resp = await fetch(`/api/secrets/${encodeURIComponent(name)}`, {method: 'DELETE'});
    if (resp.ok) {
        showToast('Secret deleted');
        loadSecrets();
    } else {
        const err = await resp.json();
        showToast(err.error || 'Failed to delete', 'error');
    }
}

function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

loadCategories();
loadSecrets();
</script>
{% endblock %}
