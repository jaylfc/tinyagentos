<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TinyAgentOS{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="stylesheet" href="/static/app.css">
</head>
<body>
    <nav class="container-fluid">
        <ul>
            <li><strong>TinyAgentOS</strong></li>
        </ul>
        <ul>
            <li><a href="/" {% if active_page == 'dashboard' %}class="active"{% endif %}>Dashboard</a></li>
            <li><a href="/store" {% if active_page == 'store' %}class="active"{% endif %}>Store</a></li>
            <li><a href="/models" {% if active_page == 'models' %}class="active"{% endif %}>Models</a></li>
            <li><a href="/images" {% if active_page == 'images' %}class="active"{% endif %}>Images</a></li>
            <li><a href="/memory" {% if active_page == 'memory' %}class="active"{% endif %}>Memory</a></li>
            <li><a href="/agents" {% if active_page == 'agents' %}class="active"{% endif %}>Agents</a></li>
            <li><a href="/settings" {% if active_page == 'settings' %}class="active"{% endif %}>Settings</a></li>
        </ul>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="container" style="text-align: center; padding: 2rem 0; color: var(--pico-muted-color); font-size: 0.85rem;">
        TinyAgentOS v0.1.0 · <a href="https://github.com/jaylfc/tinyagentos">GitHub</a> · <a href="https://buymeacoffee.com/jaylfc">Support</a>
    </footer>
    <div id="toast" style="display:none; position:fixed; bottom:20px; right:20px; padding:1rem 1.5rem; border-radius:8px; z-index:1000; background:var(--pico-primary-background); color:var(--pico-primary-inverse);"></div>
    <script>
    function showToast(msg, type='success') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.display = 'block';
        t.style.background = type === 'error' ? '#ff6b6b' : 'var(--pico-primary-background)';
        setTimeout(() => t.style.display = 'none', 3000);
    }
    document.body.addEventListener('htmx:afterRequest', function(evt) {
        if (evt.detail.xhr.status >= 400) {
            try { showToast(JSON.parse(evt.detail.xhr.response).error, 'error'); } catch(e) {}
        }
    });
    </script>
</body>
</html>
