<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TinyAgentOS{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="stylesheet" href="/static/app.css">
</head>
<body>
    <nav class="container-fluid">
        <ul>
            <li><strong>TinyAgentOS</strong></li>
        </ul>
        <ul>
            <li><a href="/" {% if active_page == 'dashboard' %}class="active"{% endif %}>Dashboard</a></li>
            <li><a href="/memory" {% if active_page == 'memory' %}class="active"{% endif %}>Memory</a></li>
            <li><a href="/agents" {% if active_page == 'agents' %}class="active"{% endif %}>Agents</a></li>
            <li><a href="/config" {% if active_page == 'config' %}class="active"{% endif %}>Config</a></li>
        </ul>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
