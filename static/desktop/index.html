<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>taOS</title>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/static/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/static/icon-16.png" />

    <!-- PWA -->
    <link rel="manifest" href="/static/manifest-desktop.json" />
    <meta name="theme-color" content="#1a1b2e" />

    <!-- iOS PWA — full screen, hide native status bar -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="taOS" />
    <link rel="apple-touch-icon" href="/static/icon-180.png" />

    <!-- Android -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Prevent text selection on long-press (OS feel) -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        /* Use dynamic viewport height — tracks visual viewport on iOS 15.4+ */
        height: 100dvh;
        width: 100vw;
        /* MUST match the pill bar colour, not the wallpaper —
           prevents "lighter area below bar" on iOS PWA by ensuring any fractional
           pixel gap bleeds through a matching colour */
        background: #14142a;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
      /* Allow text selection inside text inputs and textareas */
      input, textarea, [contenteditable="true"] {
        -webkit-user-select: text;
        user-select: text;
      }
      /* Ensure the app fills the entire screen including notch/safe areas */
      #root {
        height: 100dvh;
        width: 100vw;
      }
    </style>
    <script type="module" crossorigin src="/desktop/assets/main-DvafTxWA.js"></script>
    <link rel="modulepreload" crossorigin href="/desktop/assets/tokens-CszQHeZb.js">
    <link rel="modulepreload" crossorigin href="/desktop/assets/toolbar-BcfLPikJ.js">

    <link rel="stylesheet" crossorigin href="/desktop/assets/main-BfitWg9R.css">
  </head>

  </body>
</html>
